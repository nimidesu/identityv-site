<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity V 第五人格 ファンサイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ヘッダーエリア（一番上のグレーの帯） -->
    <header>
        <div class="header-container">
            <div class="logo">Identity V</div>
            <nav>
                <ul>
                    <li><a href="index.html" class="active">ホーム</a></li>
                    <li><a href="about.html">ゲーム概要</a></li>
                    <li><a href="survivor.html">サバイバー</a></li>
                    <li><a href="hunter.html">ハンター</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- メインビジュアルエリア -->
    <section class="main-hero">
        <div class="hero-left">
            <!-- 左側の大きな画像プレースホルダー -->
            <div class="image-placeholder">
                <span class="cross-line-1"></span>
                <span class="cross-line-2"></span>
                <p>メイン画像エリア</p>
            </div>
        </div>
        <div class="hero-right">
            <!-- 右側のテキストとボタン（ゲーム概要へ変更） -->
            <p class="hero-text">1vs4の非対称型対戦アクション「第五人格」紹介ファンサイトへようこそ。</p>
            <a href="about.html" class="btn-primary">ゲーム概要を見る</a>
        </div>
    </section>

    <!-- 区切り線 -->
    <hr class="section-divider">

    <!-- 中段のコンテンツエリア -->
    <div class="middle-content">
        <div class="container">
            <h3>インフォメーション</h3>
            <p>ここにサイトのお知らせや最新情報などが入ります。</p>
        </div>
    </div>

    <!-- 下段のグレーの大きなエリア（ハンター・サバイバーのボタンを配置） -->
    <section class="bottom-section">
        <div class="container">
            <div class="bottom-card">
                <h3>キャラクタータイプ紹介</h3>
                <p>ゲームに登場するサバイバー、ハンターの勝利条件や各立ち回りタイプ、おすすめキャラクターを詳しく解説しています。</p>
                
                <!-- 新設した2つのボタンエリア -->
                <div class="character-buttons">
                    <a href="survivor.html" class="btn-char btn-survivor">👤 サバイバーページへ</a>
                    <a href="hunter.html" class="btn-char btn-hunter">👺 ハンターページへ</a>
                </div>
            </div>
        </div>
    </section>

    <!-- 一番下のフッター -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Identity V Fan Site. 非公式ファンサイト</p>
            <div class="footer-bar"></div>
        </div>
    </footer>

</body>
</html>
